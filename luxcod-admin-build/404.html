<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>LuxCod Admin</title>
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      sessionStorage.redirect = l.pathname.slice(0, l.pathname.length - 1) +
        l.search;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/luxcod-admin/?redirect=' + sessionStorage.redirect
      );
    </script>
  </head>
  <body>
  </body>
</html>
